name: Deploy and Notify

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  # 1. 推送代码时立即通知
  push-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu notification - Code pushed
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "📤 GitHub 代码已推送\n📦 仓库: ${{ github.repository }}\n🌿 分支: ${{ github.ref_name }}\n📝 提交: ${{ github.event.head_commit.message }}\n👤 作者: ${{ github.actor }}\n⏳ 等待 Vercel 部署中..."
              }
            }'

  # 2. 部署到 Vercel
  deploy:
    runs-on: ubuntu-latest
    needs: push-notify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes

  # 3. 轮询部署状态，部署成功后通知
  wait-and-notify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment ready
        run: |
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s "https://api.vercel.com/v1/deployments" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")

            STATUS=$(echo $RESPONSE | grep -o '"readyState":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ "$STATUS" = "READY" ]; then
              echo "Deployment is ready!"
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Waiting... ($RETRY_COUNT/$MAX_RETRIES) Status: $STATUS"
            sleep 3
          done

      - name: Send Feishu notification - Deployment ready
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "✅ Vercel 部署成功！\n📦 仓库: ${{ github.repository }}\n🌿 分支: ${{ github.ref_name }}\n🌐 地址: https://chiname-ai.vercel.app"
              }
            }'
