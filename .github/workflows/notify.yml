name: Deploy and Notify

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  deploy-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        run: |
          npm install -g vercel
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes 2>&1

      - name: Wait for deployment ready
        run: |
          DEPLOYMENT_URL=""
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            # Get latest deployment for this project
            RESPONSE=$(curl -s "https://api.vercel.com/v1/deployments" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")

            # Check if deployment is ready
            STATUS=$(echo $RESPONSE | grep -o '"readyState":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ "$STATUS" = "READY" ]; then
              echo "Deployment is ready!"
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Waiting for deployment... ($RETRY_COUNT/$MAX_RETRIES) Status: $STATUS"
            sleep 3
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Timeout waiting for deployment"
          fi

      - name: Send Feishu notification
        if: github.event_name == 'push'
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "🚀 代码已部署到 Vercel！\n📦 仓库: ${{ github.repository }}\n🌿 分支: ${{ github.ref_name }}\n📝 提交: ${{ github.event.head_commit.message }}\n👤 作者: ${{ github.actor }}\n🌐 地址: https://chiname-ai.vercel.app"
              }
            }'

      - name: Send Feishu notification on release
        if: github.event_name == 'release'
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "🎉 新版本已发布到 Vercel！\n📦 仓库: ${{ github.repository }}\n🏷️ 版本: ${{ github.event.release.tag_name }}\n📝 说明: ${{ github.event.release.body }}\n🌐 地址: https://chiname-ai.vercel.app"
              }
            }'
